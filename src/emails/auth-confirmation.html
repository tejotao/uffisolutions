<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #000000; color: #ffffff; margin: 0; padding: 0; }
  .container { max-width: 600px; margin: 0 auto; background-color: #111111; border: 1px solid #222222; border-radius: 16px; overflow: hidden; margin-top: 40px; }
  .header { background-color: #000000; padding: 30px; text-align: center; border-bottom: 1px solid #222222; }
  .logo { color: #ffffff; font-size: 24px; font-weight: 900; letter-spacing: -1px; }
  .logo span { color: #f59e0b; }
  .content { padding: 40px 30px; }
  h1 { color: #ffffff; font-size: 24px; margin-bottom: 20px; }
  p { color: #a0a0a0; font-size: 16px; line-height: 1.6; margin-bottom: 20px; }
  .button { display: inline-block; background-color: #f59e0b; color: #000000; padding: 14px 28px; text-decoration: none; border-radius: 8px; font-weight: bold; margin: 20px 0; }
  .footer { background-color: #050505; padding: 30px; text-align: center; border-top: 1px solid #222222; }
  .footer p { font-size: 12px; color: #555555; margin: 0; }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">Uffi<span>Solutions</span></div>
    </div>
    <div class="content">
      <h1>Hello,</h1>
      <p>You requested an action on your UffiSolutions account.</p>
      <p>Please click the button below to proceed securely.</p>
      <center><a href="{{ .ConfirmationURL }}" class="button">Confirm Action</a></center>
      <p>If you didn't request this, please ignore this email.</p>
    </div>
    <div class="footer">
      <p>UffiSolutions é o trading name da UffiSphere HTJS Ltd – Reino Unido.</p>
      <p>London, United Kingdom</p>
    </div>
  </div>
</body>
</html>
